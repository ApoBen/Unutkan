<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3584e4" />
      <stop offset="100%" stop-color="#1c51a3" />
    </linearGradient>
    
    <!-- Lock Highlight Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0a2a5c" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Outer Shield Shadow & Base -->
  <path d="M 256,30 C 370,30 450,70 450,110 C 450,280 370,420 256,482 C 142,420 62,280 62,110 C 62,70 142,30 256,30 Z" 
        fill="url(#shieldGrad)" 
        filter="url(#dropShadow)" />

  <!-- Shield Highlight Border (Subtle inner glow effect) -->
  <path d="M 256,45 C 354,45 425,79 425,113 C 425,263 354,390 256,445 C 158,390 87,263 87,113 C 87,79 158,45 256,45 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="6" 
        stroke-opacity="0.15" />

  <!-- Lock Shackle (Kilit Kulbu) - Closed Lock Style -->
  <path d="M 196,240 V 170 C 196,120 316,120 316,170 V 240" 
        stroke="#ffffff" 
        stroke-width="28" 
        stroke-linecap="round" 
        fill="none" />

  <!-- Lock Body (Kilit Gövdesi) -->
  <rect x="166" y="225" width="180" height="135" rx="20" ry="20" 
        fill="#ffffff" 
        filter="url(#dropShadow)" />

  <!-- Keyhole (Anahtar Deliği) -->
  <circle cx="256" cy="280" r="14" fill="#1c51a3" />
  <path d="M 248,288 L 264,288 L 260,325 C 260,328 252,328 252,325 Z" fill="#1c51a3" />
</svg>
